[build]
  command = "npm install xlsx && node scripts/convert-historic-data.mjs && node scripts/publish-data.mjs && cd frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "frontend/netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ratings and live-sale-times data — short cache (updates between builds)
[[headers]]
  for = "/data/live-sale-times/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=600"

# Under-tack data — short cache (updates daily)
[[headers]]
  for = "/data/under-tack/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=600"

