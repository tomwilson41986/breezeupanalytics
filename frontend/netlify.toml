# This file is used when Netlify's UI has Base directory = "frontend/"
# All paths are relative to frontend/

[build]
  command = "cp -r ../data/under-tack/ public/data/under-tack/ 2>/dev/null; npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Under Tack data updates daily — short cache
[[headers]]
  for = "/data/under-tack/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=600"

# Video proxy — aggressive CDN caching (1 day browser, 7 days edge)
[[headers]]
  for = "/v/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800"

# Edge function: video streaming proxy
[[edge_functions]]
  path = "/v/*"
  function = "video-stream"
