# This file is used when Netlify's UI has Base directory = "frontend/"
# All paths are relative to frontend/

[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Serve static data files directly (don't rewrite to SPA)
[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200

# SPA fallback — all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
