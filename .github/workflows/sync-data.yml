name: Sync Sale Data to S3

on:
  # Run daily at 6 AM UTC (1 AM EST)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      sale_key:
        description: "Sale key to sync (blank = all)"
        required: false
        type: string
      sync_under_tack:
        description: "Also sync Under Tack data"
        required: false
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape Fasig-Tipton sales
        run: python scripts/scrape_all_ft_sales.py

      - name: Sync Under Tack data
        if: inputs.sync_under_tack != false
        env:
          BREEZEUP_AWS_ACCESS_KEY_ID: ${{ secrets.BREEZEUP_AWS_ACCESS_KEY_ID }}
          BREEZEUP_AWS_SECRET_ACCESS_KEY: ${{ secrets.BREEZEUP_AWS_SECRET_ACCESS_KEY }}
        run: python scripts/sync_under_tack.py

      - name: Sync sale data to S3
        env:
          BREEZEUP_AWS_ACCESS_KEY_ID: ${{ secrets.BREEZEUP_AWS_ACCESS_KEY_ID }}
          BREEZEUP_AWS_SECRET_ACCESS_KEY: ${{ secrets.BREEZEUP_AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "${{ inputs.sale_key }}" ]; then
            python scripts/sync_to_s3.py "${{ inputs.sale_key }}"
          else
            python scripts/sync_to_s3.py
          fi

      - name: Commit Under Tack data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/under-tack/
          if git diff --cached --quiet; then
            echo "No changes to Under Tack data"
          else
            git commit -m "Update Under Tack data $(date -u +%Y-%m-%d)"
            git push
          fi
